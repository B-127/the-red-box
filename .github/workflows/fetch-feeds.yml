name: Fetch RSS Feeds

# ─────────────────────────────────────────────────────────────────────────────
# Security notes:
#
#  L-4: The `push` trigger has been REMOVED.
#       Auto-executing on new commits would let a compromised commit run
#       with contents:write immediately. Use workflow_dispatch for setup.
#
#  M-2: All third-party Actions are pinned to a full commit SHA, not a
#       mutable tag. This prevents supply-chain attacks.
#
#  Least-privilege: contents:write ONLY — all other scopes explicitly none.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'

  # L-4: Manual trigger for first-run setup and debugging
  workflow_dispatch:

# Global deny-all, then grant only what the job needs
permissions:
  contents: write
  actions:  none
  checks:   none
  deployments: none
  issues:   none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

# Prevent two runs pushing simultaneously
concurrency:
  group: fetch-feeds
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        # M-2: pinned SHA (Node 22 runner) — verify at https://github.com/actions/checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        # M-2: pinned SHA (Node 22 runner) — verify at https://github.com/actions/setup-node
        # cache: 'npm' removed — causes a 400 on fresh repos with no prior cache entry
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # npm install is used instead of npm ci so that:
        #  (a) a real package-lock.json is generated and committed on the first run
        #      (the manually-crafted lockfile cannot pass npm ci's integrity checks)
        #  (b) subsequent runs use the committed lockfile and behave like npm ci
        # Once the lockfile is committed, this step is effectively frozen.
        run: npm install

      - name: Fetch RSS feeds
        run: node scripts/fetch-feeds.js

      - name: Commit updated feed files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage feed outputs AND the lockfile (generated on first run)
          git add feed.json stats.json package-lock.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update feeds [${TIMESTAMP}]"
            git push origin main
          fi
