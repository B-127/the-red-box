name: Fetch RSS Feeds

# ─────────────────────────────────────────────────────────────────────────────
# Security notes:
#
#  No push: trigger — auto-executing on new commits would let a compromised
#  commit run with contents:write immediately. Use workflow_dispatch for setup.
#
#  Least-privilege: contents:write ONLY — all other scopes explicitly none.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'

  # Manual trigger for first-run setup and debugging
  workflow_dispatch:

# Global deny-all, then grant only what the job needs
permissions:
  contents: write
  actions:  none
  checks:   none
  deployments: none
  issues:   none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

# Prevent two runs pushing simultaneously
concurrency:
  group: fetch-feeds
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        # v6 — runs on Node.js 24 runtime (replaces deprecated Node 20 runner)
        uses: actions/checkout@v6

      - name: Set up Node.js
        # v6 — runs on Node.js 24 runtime
        # package-manager-cache: false — prevents the cache-service 400 error
        # on fresh repos that have no prior cache entry to restore
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install dependencies
        # npm install generates a real package-lock.json on the first run and
        # commits it below — subsequent runs use the committed lockfile.
        run: npm install

      - name: Fetch RSS feeds
        run: node scripts/fetch-feeds.js

      - name: Commit updated feed files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json stats.json package-lock.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update feeds [${TIMESTAMP}]"
            git push origin main
          fi
