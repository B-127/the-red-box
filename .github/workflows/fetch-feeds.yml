name: Fetch RSS Feeds

# ─────────────────────────────────────────────────────────────────────────────
# Security notes:
#
#  L-4: The `push` trigger has been REMOVED.
#       Auto-executing on new commits would let a compromised commit run
#       with contents:write immediately. Use workflow_dispatch for setup.
#
#  M-2: All third-party Actions are pinned to a full commit SHA, not a
#       mutable tag. This prevents supply-chain attacks.
#
#  Least-privilege: contents:write ONLY — all other scopes explicitly none.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'

  # L-4: Manual trigger for first-run setup and debugging
  workflow_dispatch:

# Global deny-all, then grant only what the job needs
permissions:
  contents: write
  actions:  none
  checks:   none
  deployments: none
  issues:   none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

# Prevent two runs pushing simultaneously
concurrency:
  group: fetch-feeds
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        # M-2: pinned SHA — verify at https://github.com/actions/checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Node.js
        # M-2: pinned SHA — verify at https://github.com/actions/setup-node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds
        run: node scripts/fetch-feeds.js

      - name: Commit updated feed files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update feeds [${TIMESTAMP}]"
            git push origin main
          fi
